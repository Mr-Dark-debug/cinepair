<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Stats - Awesome Project</title>
    <link rel="stylesheet" href="../css/main.css">
    <link rel="stylesheet" href="../css/animations.css">
    <style>
        .chart-container {
            height: 400px;
            width: 100%;
            margin-top: 2rem;
            position: relative;
        }
    </style>
</head>
<body>
    <header>
        <div class="container nav-container">
            <div class="logo">
                <span id="repo-name-logo">Project</span>
            </div>
            <nav>
                <ul class="nav-links">
                    <li><a href="../../index.html">Home</a></li>
                    <li><a href="releases.html">Downloads</a></li>
                    <li><a href="changelog.html">Changelog</a></li>
                    <li><a href="stats.html" class="active">Stats</a></li>
                    <li><a href="contributors.html">Contributors</a></li>
                    <li><a href="about.html">About</a></li>
                </ul>
            </nav>
        </div>
    </header>

    <main>
        <section class="container mt-4">
            <div class="text-center mb-4 fade-in-up">
                <h1>Repository Growth</h1>
                <p>Track the activity and momentum of the project over time.</p>
            </div>

            <div class="card fade-in-up delay-1">
                <h3>Commit Activity (Last 52 Weeks)</h3>
                <div class="chart-container" id="chart-loader">
                    <p class="text-center text-muted" style="line-height:400px;">Loading chart data...</p>
                </div>
                <canvas id="activityChart" style="display:none;"></canvas>
            </div>
            
            <div class="stats-row mt-4 reveal">
                <div class="stat-card card">
                    <div class="stat-number" id="stat-watchers">0</div>
                    <div class="stat-label">Watchers</div>
                </div>
                <div class="stat-card card">
                    <div class="stat-number" id="stat-network">0</div>
                    <div class="stat-label">Network</div>
                </div>
                <div class="stat-card card">
                    <div class="stat-number" id="stat-subscribers">0</div>
                    <div class="stat-label">Subscribers</div>
                </div>
            </div>
        </section>
    </main>

    <footer class="mt-4">
        <div class="container">
            <p>&copy; 2026 Open Source Project.</p>
        </div>
    </footer>

    <script type="module">
        import { api } from '../js/api.js';
        import { UI } from '../js/ui.js';
        import { ChartsManager } from '../js/charts.js';

        document.addEventListener('DOMContentLoaded', async () => {
            UI.setupScrollReveal();
            
            try {
                const repoData = await api.getRepoInfo();
                UI.populateHeader(repoData);
                
                if (repoData) {
                    UI.animateCounter(document.getElementById('stat-watchers'), repoData.watchers_count || 0);
                    UI.animateCounter(document.getElementById('stat-network'), repoData.network_count || 0);
                    UI.animateCounter(document.getElementById('stat-subscribers'), repoData.subscribers_count || 0);
                }

                const commitData = await api.getCommitActivity();
                const chartLoader = document.getElementById('chart-loader');
                const canvas = document.getElementById('activityChart');
                
                if (commitData && Array.isArray(commitData) && commitData.length > 0) {
                    chartLoader.style.display = 'none';
                    canvas.style.display = 'block';
                    ChartsManager.renderActivityChart('activityChart', commitData);
                } else {
                    chartLoader.innerHTML = '<p class="text-center text-muted" style="line-height:400px;">No commit activity data available.</p>';
                }
            } catch (e) {
                console.error(e);
                document.getElementById('chart-loader').innerHTML = '<p class="text-center text-muted" style="line-height:400px;">Failed to load data.</p>';
            }
        });
    </script>
</body>
</html>
