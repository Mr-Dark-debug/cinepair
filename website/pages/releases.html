<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Releases - Awesome Project</title>
    <link rel="stylesheet" href="../css/main.css">
    <link rel="stylesheet" href="../css/animations.css">
    <style>
        .release-card { margin-bottom: 2rem; }
        .release-header { display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid var(--bg-soft); padding-bottom: 1rem; margin-bottom: 1rem; }
        .release-version { font-size: 1.5rem; font-weight: 800; display: flex; align-items: center; gap: 0.5rem; }
        .release-date { color: var(--text-muted); font-size: 0.875rem; }
        .release-body { margin-bottom: 1.5rem; font-size: 0.95rem; }
        .release-assets { background: var(--bg-soft); border-radius: var(--radius-sm); padding: 1rem; }
        .asset-item { display: flex; justify-content: space-between; align-items: center; padding: 0.75rem 0; border-bottom: 1px solid rgba(0,0,0,0.05); }
        .asset-item:last-child { border-bottom: none; padding-bottom: 0; }
        .asset-name { font-weight: 600; display: flex; align-items: center; gap: 0.5rem; }
        .asset-size { color: var(--text-muted); font-size: 0.875rem; margin-right: 1rem;}
        @media (max-width: 600px) {
            .release-header { flex-direction: column; align-items: flex-start; gap: 0.5rem; }
            .asset-item { flex-direction: column; align-items: flex-start; gap: 0.5rem; }
        }
    </style>
</head>
<body>
    <header>
        <div class="container nav-container">
            <div class="logo">
                <span id="repo-name-logo">Project</span>
            </div>
            <nav>
                <ul class="nav-links">
                    <li><a href="../../index.html">Home</a></li>
                    <li><a href="releases.html" class="active">Downloads</a></li>
                    <li><a href="changelog.html">Changelog</a></li>
                    <li><a href="stats.html">Stats</a></li>
                    <li><a href="contributors.html">Contributors</a></li>
                    <li><a href="about.html">About</a></li>
                </ul>
            </nav>
        </div>
    </header>

    <main>
        <section class="container mt-4">
            <div class="text-center mb-4 fade-in-up">
                <h1>Download Center</h1>
                <p>Get the latest versions and official releases.</p>
            </div>

            <div id="releases-container" class="fade-in-up delay-1">
                <!-- Skeleton loader -->
                <div class="card release-card skeleton" style="height: 200px;"></div>
                <div class="card release-card skeleton" style="height: 200px;"></div>
            </div>
        </section>
    </main>

    <footer class="mt-4">
        <div class="container">
            <p>&copy; 2026 Open Source Project.</p>
        </div>
    </footer>

    <script type="module">
        import { api } from '../js/api.js';
        import { UI } from '../js/ui.js';

        document.addEventListener('DOMContentLoaded', async () => {
            const container = document.getElementById('releases-container');
            try {
                const repoData = await api.getRepoInfo();
                UI.populateHeader(repoData);

                const releases = await api.getReleases();
                container.innerHTML = ''; // clear skeletons
                
                if (!releases || releases.length === 0) {
                    container.innerHTML = '<div class="card text-center"><p>No releases found yet.</p></div>';
                    return;
                }

                releases.forEach((release, index) => {
                    const isLatest = index === 0;
                    const date = UI.formatDate(release.published_at);
                    
                    let assetsHtml = '';
                    if (release.assets && release.assets.length > 0) {
                        assetsHtml = `<div class="release-assets">
                            <h4 class="mb-1">Assets</h4>
                            ${release.assets.map(asset => `
                                <div class="asset-item">
                                    <div class="asset-name">
                                        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"></path><polyline points="7 10 12 15 17 10"></polyline><line x1="12" y1="15" x2="12" y2="3"></line></svg>
                                        ${asset.name}
                                    </div>
                                    <div>
                                        <span class="asset-size">${UI.formatBytes(asset.size)}</span>
                                        <a href="${asset.browser_download_url}" class="btn btn-primary" style="padding: 0.5rem 1rem; font-size: 0.875rem;">Download</a>
                                    </div>
                                </div>
                            `).join('')}
                        </div>`;
                    } else if (release.html_url) {
                         assetsHtml = `
                            <div class="mt-4">
                                <a href="${release.html_url}" target="_blank" class="btn btn-secondary">View on GitHub</a>
                            </div>
                        `;
                    }

                    const badge = release.prerelease ? '<span class="badge pre">Pre-release</span>' : 
                                  (isLatest ? '<span class="badge stable">Latest</span>' : '');

                    const cardHtml = `
                        <div class="card release-card reveal">
                            <div class="release-header">
                                <div class="release-version">
                                    ${release.name || release.tag_name}
                                    ${badge}
                                </div>
                                <div class="release-date">Published on ${date}</div>
                            </div>
                            <div class="release-body">
                                ${UI.renderMarkdown(release.body || 'No release notes provided.')}
                            </div>
                            ${assetsHtml}
                        </div>
                    `;
                    container.innerHTML += cardHtml;
                });
                
                UI.setupScrollReveal();

            } catch (e) {
                console.error(e);
                container.innerHTML = '<div class="card text-center"><p>Error loading releases.</p></div>';
            }
        });
    </script>
</body>
</html>
